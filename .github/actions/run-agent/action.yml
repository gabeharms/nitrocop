name: Run Agent
description: >-
  Execute an AI agent backend with proper secret injection, token masking,
  and progress monitoring. Backend configuration is resolved entirely from
  resolve_backend.py — adding a new backend only requires changes there.

inputs:
  backend:
    description: Backend identifier (e.g. claude-normal, minimax, codex-hard)
    required: true
  actions_read_token:
    description: Read-only GitHub token (used for GH_TOKEN and masked via guard_backend_secrets)
    required: true
  # Pass all secrets unconditionally. The action injects only those the
  # backend actually needs, based on resolve_backend.py's secret mappings.
  minimax_api_key:
    description: MiniMax API key secret
    default: ''
  anthropic_api_key:
    description: Anthropic API key secret
    default: ''
  codex_auth_json:
    description: Codex auth JSON secret
    default: ''
  claude_code_oauth_token:
    description: Claude Code OAuth token secret
    default: ''

runs:
  using: composite
  steps:
    - name: Setup, mask, and run agent
      shell: bash
      env:
        BACKEND: ${{ inputs.backend }}
        GH_TOKEN_FOR_ACTIONS_READ: ${{ inputs.actions_read_token }}
        # Env var names match resolve_backend.py secret_ keys so that
        # the loop below can look them up via indirect expansion.
        _SECRET_MINIMAX_API_KEY: ${{ inputs.minimax_api_key }}
        _SECRET_ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        _SECRET_CODEX_AUTH_JSON: ${{ inputs.codex_auth_json }}
        _SECRET_CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_code_oauth_token }}
      run: |
        # --- Resolve backend config ---
        python3 scripts/workflows/resolve_backend.py "$BACKEND" \
          > "$RUNNER_TEMP/backend.env"
        cfg() { sed -n "s/^$1=//p" "$RUNNER_TEMP/backend.env"; }

        # Export non-secret env vars (ANTHROPIC_MODEL, API_TIMEOUT_MS, etc.)
        while IFS='=' read -r key value; do
          export "${key#env_}=$value"
        done < <(grep '^env_' "$RUNNER_TEMP/backend.env")

        export CARGO_INCREMENTAL=1
        export GH_TOKEN="$GH_TOKEN_FOR_ACTIONS_READ"
        export GH_TOKEN_FOR_ACTIONS_READ

        # Inject secrets using resolve_backend.py's secret mappings.
        # Each line is secret_<INPUT>=<TARGET_ENV_VAR>.  We look up
        # _SECRET_<INPUT> via indirect expansion and export as TARGET.
        while IFS='=' read -r key target_var; do
          src_env="_SECRET_${key#secret_}"
          if [ -n "${!src_env}" ]; then
            export "$target_var=${!src_env}"
          fi
        done < <(grep '^secret_' "$RUNNER_TEMP/backend.env")

        # --- Run backend setup (installs CLI, masks backend secret) ---
        eval "$(cfg setup_cmd)"

        # --- Mask read-only GitHub token ---
        python3 scripts/workflows/guard_backend_secrets.py \
          --from-env GH_TOKEN_FOR_ACTIONS_READ \
          emit-masks

        # --- Background progress watcher + agent run ---
        python3 scripts/workflows/agent_logs.py watch \
          --newer-than "$FINAL_TASK_FILE" --interval 30 \
          --backend "$(cfg log_format)" &
        WATCHER_PID=$!

        eval "$(cfg run_cmd)"

        kill $WATCHER_PID 2>/dev/null || true
