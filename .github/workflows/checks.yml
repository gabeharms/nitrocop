name: Checks

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        if: matrix.os == 'ubuntu-24.04'
        run: cargo fmt --check

      - name: No vendor include macros
        if: matrix.os == 'ubuntu-24.04'
        run: bash scripts/check_no_vendor_include_macros.sh

      - name: Gem builder tests
        if: matrix.os == 'ubuntu-24.04'
        run: ruby gem/test/gem_builder_test.rb

      - name: Python script tests
        if: matrix.os == 'ubuntu-24.04'
        run: |
          for f in tests/python/test_*.py; do
            echo "=== $f ==="
            python3 "$f"
          done

      - name: Clippy
        if: matrix.os == 'ubuntu-24.04'
        run: cargo clippy --profile ci -- -D warnings

      - name: Build
        run: cargo build --profile ci

      - name: NodePattern verifier
        if: matrix.os == 'ubuntu-24.04'
        run: cargo test --profile ci verifier -- --nocapture

      - name: Config audit
        if: matrix.os == 'ubuntu-24.04'
        run: cargo test --profile ci config_audit -- --nocapture

      - name: Prism pitfalls
        if: matrix.os == 'ubuntu-24.04'
        run: cargo test --profile ci prism_pitfalls -- --nocapture

      - name: File discovery sync
        if: matrix.os == 'ubuntu-24.04'
        run: cargo test --profile ci file_discovery_sync -- --nocapture

      - name: Test
        run: cargo test --profile ci

  # Corpus smoke test: run nitrocop + rubocop on a few cheap sentinel repos to
  # catch systemic regressions (file discovery, config, plugin loading, directives)
  # before they reach the full 1000-repo corpus oracle.
  corpus-smoke-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - uses: ruby/setup-ruby@v1

      - name: Cache corpus bundle
        uses: actions/cache@v4
        with:
          path: bench/corpus/vendor/bundle
          key: corpus-smoke-bundle-${{ hashFiles('bench/corpus/Gemfile.lock') }}

      - name: Install corpus gems
        run: |
          cd bench/corpus
          bundle config set --local path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Run smoke test
        run: python3 scripts/corpus_smoke_test.py --binary target/release/nitrocop
