#cloud-config

users:
  - name: runner
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ${ssh_public_key}

package_update: true
packages:
  - build-essential
  - pkg-config
  - libssl-dev
  - git
  - curl
  - jq
  - python3
  - python3-pip
  - docker.io

write_files:
  - path: /opt/setup-runner.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      RUNNER_USER=runner
      RUNNER_HOME=/home/$RUNNER_USER
      RUNNER_DIR=$RUNNER_HOME/actions-runner
      REPO="${github_repo}"
      TOKEN="${github_runner_token}"

      echo "=== Installing Rust toolchain ==="
      sudo -u $RUNNER_USER bash -c 'curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y'
      sudo -u $RUNNER_USER bash -c 'source $HOME/.cargo/env && rustup component add rustfmt clippy'

      echo "=== Installing Ruby (via mise) ==="
      sudo -u $RUNNER_USER bash -c 'curl https://mise.run | sh'
      sudo -u $RUNNER_USER bash -c 'echo "eval \"\$(\$HOME/.local/bin/mise activate bash)\"" >> $HOME/.bashrc'
      sudo -u $RUNNER_USER bash -c '$HOME/.local/bin/mise install ruby@3.3 && $HOME/.local/bin/mise use -g ruby@3.3'

      echo "=== Installing Node.js (for Codex CLI) ==="
      sudo -u $RUNNER_USER bash -c '$HOME/.local/bin/mise install node@22 && $HOME/.local/bin/mise use -g node@22'

      echo "=== Installing GitHub Actions Runner ==="
      mkdir -p $RUNNER_DIR
      cd $RUNNER_DIR
      RUNNER_VERSION=$(curl -s https://api.github.com/repos/actions/runner/releases/latest | jq -r '.tag_name' | sed 's/^v//')
      curl -sL "https://github.com/actions/runner/releases/download/v${RUNNER_VERSION}/actions-runner-linux-x64-${RUNNER_VERSION}.tar.gz" | tar xz
      chown -R $RUNNER_USER:$RUNNER_USER $RUNNER_DIR

      echo "=== Configuring runner ==="
      sudo -u $RUNNER_USER bash -c "cd $RUNNER_DIR && ./config.sh --url https://github.com/$REPO --token $TOKEN --name nitrocop-runner --labels self-hosted,linux,x64,nitrocop --unattended --replace"

      echo "=== Installing runner as systemd service ==="
      cd $RUNNER_DIR
      ./svc.sh install $RUNNER_USER
      ./svc.sh start

      echo "=== Pre-warming: clone repo and build ==="
      sudo -u $RUNNER_USER bash -c "
        source \$HOME/.cargo/env
        cd \$HOME
        git clone --recurse-submodules https://github.com/$REPO.git nitrocop
        cd nitrocop
        cargo build
        cargo build --release
        CARGO_INCREMENTAL=1 cargo test --lib --no-run
      "

      echo "=== Setup complete ==="

runcmd:
  - bash /opt/setup-runner.sh 2>&1 | tee /var/log/runner-setup.log
