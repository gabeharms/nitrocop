#cloud-config

users:
  - name: runner
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL

package_update: true
packages:
  - build-essential
  - pkg-config
  - libssl-dev
  - git
  - curl
  - jq
  - python3
  - python3-pip
  - docker.io
  - mold
  - clang

write_files:
  - path: /opt/setup-runner.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      RUNNER_USER=runner
      RUNNER_HOME=/home/$RUNNER_USER
      REPO="${github_repo}"
      TOKEN="${github_runner_token}"
      NUM_RUNNERS=3

      echo "=== Installing Rust toolchain ==="
      sudo -u $RUNNER_USER bash -c 'curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y'
      sudo -u $RUNNER_USER bash -c 'source $HOME/.cargo/env && rustup component add rustfmt clippy'

      echo "=== Configuring mold linker ==="
      sudo -u $RUNNER_USER mkdir -p $RUNNER_HOME/.cargo
      sudo -u $RUNNER_USER bash -c 'cat >> $HOME/.cargo/config.toml << EOF
      [target.x86_64-unknown-linux-gnu]
      linker = "clang"
      rustflags = ["-C", "link-arg=-fuse-ld=mold"]
      EOF'

      echo "=== Installing Ruby (via mise) ==="
      sudo -u $RUNNER_USER bash -c 'curl https://mise.run | sh'
      sudo -u $RUNNER_USER bash -c 'echo "eval \"\$(\$HOME/.local/bin/mise activate bash)\"" >> $HOME/.bashrc'
      sudo -u $RUNNER_USER bash -c '$HOME/.local/bin/mise install ruby@3.3 && $HOME/.local/bin/mise use -g ruby@3.3'

      echo "=== Installing Node.js (for Codex CLI) ==="
      sudo -u $RUNNER_USER bash -c '$HOME/.local/bin/mise install node@22 && $HOME/.local/bin/mise use -g node@22'

      echo "=== Downloading GitHub Actions Runner ==="
      RUNNER_VERSION=$(curl -s https://api.github.com/repos/actions/runner/releases/latest | jq -r '.tag_name' | sed 's/^v//')
      RUNNER_TAR="/tmp/actions-runner-linux-x64-${RUNNER_VERSION}.tar.gz"
      curl -sL "https://github.com/actions/runner/releases/download/v${RUNNER_VERSION}/${RUNNER_TAR##*/}" -o "$RUNNER_TAR"

      echo "=== Installing $NUM_RUNNERS runner instances ==="
      for i in $(seq 1 $NUM_RUNNERS); do
        RUNNER_DIR="$RUNNER_HOME/runner-$i"
        mkdir -p "$RUNNER_DIR"
        tar xz -C "$RUNNER_DIR" -f "$RUNNER_TAR"
        chown -R $RUNNER_USER:$RUNNER_USER "$RUNNER_DIR"

        sudo -u $RUNNER_USER bash -c "cd $RUNNER_DIR && ./config.sh \
          --url https://github.com/$REPO \
          --token $TOKEN \
          --name nitrocop-runner-$i \
          --labels self-hosted,linux,x64,nitrocop \
          --work $RUNNER_HOME/work \
          --unattended --replace"

        cd "$RUNNER_DIR"
        ./svc.sh install $RUNNER_USER
        ./svc.sh start
        echo "Runner $i started"
      done
      rm -f "$RUNNER_TAR"

      echo "=== Creating shared cargo target directory ==="
      sudo -u $RUNNER_USER mkdir -p $RUNNER_HOME/cargo-target

      echo "=== Pre-warming: clone repo and build into shared target ==="
      sudo -u $RUNNER_USER bash -c "
        source \$HOME/.cargo/env
        cd \$HOME
        git clone --recurse-submodules https://github.com/$REPO.git nitrocop-cache
        cd nitrocop-cache
        CARGO_TARGET_DIR=\$HOME/cargo-target cargo build
        CARGO_TARGET_DIR=\$HOME/cargo-target CARGO_INCREMENTAL=1 cargo test --lib --no-run
      "

      echo "=== Setup complete ==="

runcmd:
  - bash /opt/setup-runner.sh 2>&1 | tee /var/log/runner-setup.log
